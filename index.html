<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1er añito de Eithan</title>

<!-- CONFIGURACIÓN PARA WHATSAPP -->
<meta property="og:title" content="¡Invitación al cumple de Eithan! 🎁 🎀" />
<meta property="og:description" content="Te invitamos a sumarte a este gran día. Ingresa aquí para ver todos los detalles 👇" />
<meta property="og:image" content="https://github.io" />
<meta property="og:image:type" content="image/png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:type" content="website" />

<style>
/* Configuración global del scroll continuo y fluido */
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    background: black;
    font-family: 'Arial', sans-serif;
    overflow: hidden; /* Bloquea el scroll hasta que den clic en ingresar */
}

/* 🌟 PANTALLA DE BIENVENIDA OBLIGATORIA PARA ACTIVAR EL AUDIO */
.pantalla-inicio {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background-color: #000000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.8s ease, visibility 0.8s;
}

/* Estilo del botón elegante */
.boton-ingresar {
    padding: 15px 35px;
    font-size: 16px;
    background-color: #ffffff;
    color: #000000;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 1px;
    box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
    transition: transform 0.2s ease;
}

.boton-ingresar:active {
    transform: scale(0.95);
}

.galeria {
    display: flex;
    flex-direction: column;
}

.imagen {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    view-timeline-name: --revelarImagen;
    view-timeline-axis: block;
}

.imagen img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    animation-name: aparecerGradual;
    animation-fill-mode: both;
    animation-timeline: --revelarImagen;
    animation-range: entry 10% cover 40%;
}

@keyframes aparecerGradual {
    from {
        opacity: 0;
        transform: scale(0.85);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}
    .botones{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:999;
}

.btn{
    padding:14px;
    border-radius:50%;
    color:white;
    font-size:20px;
    border:none;
    cursor:pointer;
}

.wa{ background:#25D366; }
.map{ background:#4285F4; }
</style>
</head>
<!-- BOTONES FLOTANTES -->
<div class="botones">
    <button class="btn wa" onclick="whatsapp()">💬</button>
    <button class="btn map" onclick="ubicacion()">📍</button>
</div>
<body>

<!-- 🌟 Pantalla de bienvenida interactiva -->
<div id="pantallaInicio" class="pantalla-inicio">
    <button class="boton-ingresar" onclick="comenzarInvitacion()">ABRIR INVITACIÓN🎉 🎊 🎈 </button>
</div>

<!-- Elemento de audio (oculto) en bucle -->
<audio id="musicaFondo" loop>
    <source src="musica-bautismo.mp3" type="audio/mpeg">
    Tu navegador no soporta el elemento de audio.
</audio>

<!-- Galería de fotos -->
<div class="galeria">
    <div class="imagen"><img src="1.png"></div>
    <div class="imagen"><img src="2.png"></div>
    <div class="imagen"><img src="3.png"></div>
    <div class="imagen"><img src="4.png"></div>
    <div class="imagen"><img src="5.png"></div>
    <div class="imagen"><img src="6.png"></div>
</div>

<script>
var audio = document.getElementById('musicaFondo');
var musicaIniciada = false;

function comenzarInvitacion() {
    // 1. Oculta la pantalla de inicio con una transición suave
    var pantalla = document.getElementById('pantallaInicio');
    pantalla.style.opacity = '0';
    pantalla.style.visibility = 'hidden';
    
    // 2. Permite el scroll para ver las fotos
    document.body.style.overflow = 'auto';

    // 3. Reproduce la música de forma segura
    audio.play().then(function() {
        musicaIniciada = true;
    }).catch(function(error) {
        console.log("Error al reproducir el audio:", error);
    });
}

// Control de estado: Apaga la música al minimizar o salir
document.addEventListener('visibilitychange', function() {
    if (!musicaIniciada) return;

    if (document.hidden) {
        audio.pause(); // Se minimizó: Apaga la música
    } else {
        audio.play().catch(function(error) {
            console.log("No se pudo reanudar el audio:", error);
        }); // Regresó: Enciende la música de nuevo
    }
});
    function whatsapp(){
    let mensaje = "Confirmo asistencia al cumpleaños mi nombre es: ";
    window.open("https://wa.me/595981011531?text=" + encodeURIComponent(mensaje));
}

function ubicacion(){
    window.open("https://maps.app.goo.gl/o5QvAw4BDHEiffHUA");
}
</script>

</body>
</html>
