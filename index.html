<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1er añito de Eithan</title>

<!-- WHATSAPP -->
<meta property="og:title" content="¡Invitación al cumple de Eithan! 🎁🎀">
<meta property="og:description"
content="Te invitamos a sumarte a este gran día. Ingresa aquí para ver todos los detalles 👇">

<!-- IMPORTANTE: usar PNG/JPG para vista previa -->
<meta property="og:image"
content="https://TU-DOMINIO.com/preview.jpg">

<meta property="og:type" content="website">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
background:#000;
font-family:Arial,sans-serif;
overflow:hidden;
}

/* Pantalla inicio */

.pantalla-inicio{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:#000;

z-index:9999;

transition:.8s;
}

.boton-ingresar{
padding:16px 30px;

border:none;

border-radius:30px;

font-size:16px;

font-weight:bold;

cursor:pointer;
}

.galeria{
display:flex;
flex-direction:column;
}

.imagen{
height:100vh;

display:flex;

justify-content:center;

align-items:center;
}

.imagen img{

width:100%;

height:100%;

object-fit:contain;

display:block;
}

/* BOTONES */

.botones{

position:fixed;

bottom:20px;

right:20px;

display:flex;

flex-direction:column;

gap:10px;

z-index:999;

}

.btn{

width:60px;

height:60px;

border-radius:50%;

border:none;

color:white;

font-size:22px;

cursor:pointer;

}

.wa{
background:#25D366;
}

.map{
background:#4285F4;
}

</style>

</head>

<body>

<div class="botones">

<button class="btn wa"
onclick="whatsapp()">💬</button>

<button class="btn map"
onclick="ubicacion()">📍</button>

</div>


<div
id="pantallaInicio"
class="pantalla-inicio">

<button
class="boton-ingresar"
onclick="comenzarInvitacion()">

ABRIR INVITACIÓN 🎉

</button>

</div>


<audio
id="musicaFondo"
loop
preload="auto">

<source
src="musica-bautismo.mp3"
type="audio/mpeg">

</audio>


<div class="galeria">

<div class="imagen">
<img src="./1.svg" alt="">
</div>

<div class="imagen">
<img src="./2.svg" alt="">
</div>

<div class="imagen">
<img src="./3.svg" alt="">
</div>

<div class="imagen">
<img src="./4.svg" alt="">
</div>

</div>


<script>

const audio =
document.getElementById("musicaFondo");

function comenzarInvitacion(){

const pantalla =
document.getElementById("pantallaInicio");

pantalla.style.opacity="0";

setTimeout(()=>{
pantalla.style.display="none";
},800);

document.body.style.overflow="auto";

audio.play()
.catch(()=>{
console.log("Audio bloqueado");
});

}


document.addEventListener(
"visibilitychange",
()=>{

if(document.hidden){

audio.pause();

}else{

audio.play()
.catch(()=>{});

}

}
);

function whatsapp(){

let mensaje =
"Confirmo asistencia al cumpleaños. Mi nombre es:";

window.open(
"https://wa.me/595981011531?text="
+
encodeURIComponent(mensaje)
);

}

function ubicacion(){

window.open(
"https://maps.app.goo.gl/o5QvAw4BDHEiffHUA"
);

}

</script>

</body>

</html>
