<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumpleaños Jungla</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: Arial;
    background:#0a1a0a;
    color:white;
    overflow-x:hidden;
}

/* SECCIONES */
section{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

/* HERO */
.hero{
    background:url("1.jpg") center/cover no-repeat;
}

/* OVERLAY OSCURO */
.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

/* TEXTO */
h1{
    font-size:34px;
    z-index:2;
}

p{
    margin-top:10px;
}

/* ANIMACIÓN */
.fade{
    opacity:0;
    transform:translateY(40px);
    transition:1s;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

/* GALERÍA */
.gallery{
    display:flex;
    gap:12px;
    overflow-x:auto;
    padding:10px;
}

.gallery img{
    height:180px;
    border-radius:15px;
}

/* BOTONES */
button{
    margin:10px;
    padding:15px 25px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
}

.map{background:#4CAF50;color:white;}
.wa{background:#25D366;color:white;}

/* ENTRADA */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

.enter{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- PANTALLA INICIAL -->
<div class="overlay" id="overlay">
    <h2>🌴 Bienvenido a la Jungla</h2>
    <button class="enter" onclick="entrar()">Entrar</button>
</div>

<!-- PORTADA -->
<section class="hero">
    <h1 class="fade">🎉 Cumpleaños Salvaje</h1>
    <p class="fade">Prepárate para una noche inolvidable</p>
</section>

<!-- INFO -->
<section>
    <h2 class="fade">Estás Invitado</h2>
    <p class="fade">Una fiesta en la jungla te espera 🐆</p>
</section>

<!-- GALERÍA CON TUS FOTOS -->
<section>
    <h2 class="fade">Galería</h2>
    <div class="gallery fade">
        <img src="2.jpg">
        <img src="3.jpg">
        <img src="4.jpg">
        <img src="5.jpg">
        <img src="6.jpg">
        <img src="7.jpg">
        <img src="8.jpg">
    </div>
</section>

<!-- UBICACIÓN -->
<section>
    <h2 class="fade">Ubicación</h2>
    <button class="map fade" onclick="mapa()">📍 Ver en Google Maps</button>
</section>

<!-- CONFIRMAR -->
<section>
    <h2 class="fade">Confirmar asistencia</h2>
    <button class="wa fade" onclick="wa()">💬 WhatsApp</button>
</section>

<!-- AUDIO -->
<audio id="audio" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let audio = document.getElementById("audio");

/* ENTRAR */
function entrar(){
    document.getElementById("overlay").style.display="none";
    audio.play();
}

/* SCROLL ANIMADO */
let faders = document.querySelectorAll(".fade");

window.addEventListener("scroll", () => {
    faders.forEach(el=>{
        let top = el.getBoundingClientRect().top;
        if(top < window.innerHeight - 50){
            el.classList.add("show");
        }
    });
});

/* BOTONES */
function mapa(){
    window.open("https://maps.app.goo.gl/9MVH4WbjdRik2xXS7");
}

function wa(){
    let url="https://wa.me/595981011531?text=Confirmo mi asistencia 🎉";
    window.open(url);
}

/* PAUSAR MUSICA */
window.addEventListener("blur",()=>audio.pause());
window.addEventListener("beforeunload",()=>audio.pause());
</script>

</body>
</html>
