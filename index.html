<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1er añito de Eithan</title>

<!-- WHATSAPP / OPEN GRAPH -->
<meta property="og:title" content="¡Invitación al cumple de Eithan! 🎁🎀">
<meta property="og:description"
content="Te invitamos a sumarte a este gran día. Ingresa aquí para ver todos los detalles 👇">

<meta property="og:image"
content="https://pcesde.github.io/invitaci%C3%B3n-cumple-eithan/preview.jpg">

<meta property="og:type" content="website">

<meta property="og:url"
content="https://pcesde.github.io/invitaci%C3%B3n-cumple-eithan/">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
background:#000;
font-family:Arial,sans-serif;
overflow:hidden;
}

/* PANTALLA INICIO */
.pantalla-inicio{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
z-index:9999;
transition:opacity 0.6s ease;
}

.boton-ingresar{
padding:16px 30px;
border:none;
border-radius:30px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* GALERIA */
.galeria{
display:flex;
flex-direction:column;
}

.imagen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.imagen img{
width:100%;
height:100%;
object-fit:contain;
}

/* BOTONES */
.botones{
position:fixed;
bottom:20px;
right:20px;
display:flex;
flex-direction:column;
gap:12px;
z-index:999;
}

/* WHATSAPP */
.btn.wa{
background:#25D366;
width:65px;
height:65px;
border-radius:50%;
border:none;
color:white;
font-size:22px;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.btn.wa span{
font-size:10px;
}

/* UBICACIÓN */
.btn.mapa{
display:flex;
align-items:center;
gap:10px;
padding:14px 16px;
border-radius:18px;
border:none;
cursor:pointer;
color:white;
background:linear-gradient(135deg,#4285F4,#5BA7FF);
box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

.texto-lugar{
text-align:left;
font-size:13px;
font-weight:bold;
line-height:1.2;
}

/* COMO LLEGAR */
.btn.ruta{
display:flex;
align-items:center;
gap:10px;
padding:14px 16px;
border-radius:18px;
border:none;
cursor:pointer;
color:white;
background:linear-gradient(135deg,#FF9800,#FFB74D);
box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

</style>

</head>

<body>

<!-- BOTONES -->
<div class="botones">

<button class="btn wa" onclick="whatsapp()">
💬 <span>OK</span>
</button>

<button class="btn mapa" onclick="ubicacion()">
📍
<div class="texto-lugar">
ScutiPARK<br>
Quinta Villamayor - San Lorenzo
</div>
</button>

<button class="btn ruta" onclick="comoLlegar()">
🧭
</button>

</div>

<!-- INICIO -->
<div id="pantallaInicio" class="pantalla-inicio">
<button class="boton-ingresar" onclick="comenzarInvitacion()">
ABRIR INVITACIÓN 🎉
</button>
</div>

<!-- AUDIO -->
<audio id="musicaFondo" loop preload="auto">
<source src="musica-bautismo.mp3" type="audio/mpeg">
</audio>

<!-- GALERIA -->
<div class="galeria">

<div class="imagen"><img src="./1.svg"></div>
<div class="imagen"><img src="./2.svg"></div>
<div class="imagen"><img src="./3.svg"></div>
<div class="imagen"><img src="./4.svg"></div>

</div>

<script>

const audio = document.getElementById("musicaFondo");

function comenzarInvitacion(){

const pantalla = document.getElementById("pantallaInicio");

pantalla.style.opacity = "0";

setTimeout(()=>{
pantalla.style.display = "none";
document.body.style.overflow = "auto";
},600);

audio.currentTime = 0;
audio.play().catch(()=>{});

}

document.addEventListener("visibilitychange",()=>{
if(document.hidden){
audio.pause();
}else{
audio.play().catch(()=>{});
}
});

function whatsapp(){
let mensaje="Confirmo asistencia al cumpleaños. Mi nombre es:";
window.open("https://wa.me/595981011531?text="+encodeURIComponent(mensaje));
}

function ubicacion(){
window.open("https://maps.app.goo.gl/o5QvAw4BDHEiffHUA");
}

function comoLlegar(){
let destino="ScutiPARK Quinta Villamayor San Lorenzo Paraguay MFPM+P74";
let url="https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(destino);
window.open(url);
}

</script>

</body>
</html>
