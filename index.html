<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎉 Eithan cumple 1 añito</title>

<meta property="og:title" content="🎉 ¡Eithan cumple 1 añito!🎉 ">
<meta property="og:description" content="Estás invitado a celebrar este día especial 🎂👇">
<meta property="og:image" content="https://raw.githubusercontent.com/pcesde/invitacion-cumple-eithan/main/preview.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://pcesde.github.io/invitacion-cumple-eithan/">
<meta property="og:type" content="website">

<meta name="theme-color" content="#000000">

<style>

html{scroll-behavior:smooth;}

body{
margin:0;
background:#000;
font-family:Arial,sans-serif;
overflow:hidden;
}

/* INICIO */
.pantalla-inicio{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#111,#000);
z-index:9999;
transition:opacity 0.6s ease;
}

.boton-ingresar{
padding:18px 34px;
border:none;
border-radius:40px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(135deg,#FFD54F,#FFB300);
}

/* GALERIA */
.galeria{display:flex;flex-direction:column;}
.imagen{height:100vh;display:flex;justify-content:center;align-items:center;}
.imagen img{width:100%;height:100%;object-fit:contain;}

/* BOTONES */
.botones{
position:fixed;
bottom:20px;
right:20px;
display:flex;
flex-direction:column;
gap:12px;
z-index:999;
}

.btn.wa{
background:#25D366;
width:65px;
height:65px;
border-radius:50%;
border:none;
color:white;
font-size:22px;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.btn.mapa,.btn.ruta{
display:flex;
align-items:center;
gap:10px;
padding:14px 16px;
border-radius:18px;
border:none;
cursor:pointer;
color:white;
}

.btn.mapa{background:linear-gradient(135deg,#4285F4,#5BA7FF);}
.btn.ruta{background:linear-gradient(135deg,#FF9800,#FFB74D);}

.texto-lugar{font-size:13px;font-weight:bold;}

/* POPUP RSVP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-contenido{
background:#fff;
padding:25px;
border-radius:20px;
text-align:center;
max-width:320px;
animation:fadeIn 0.3s ease;
}

.popup button{
margin:10px;
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.si{background:#25D366;color:white;}
.no{background:#e74c3c;color:white;}

@keyframes fadeIn{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

</style>

</head>

<body>

<div class="botones">

<button class="btn wa" onclick="abrirPopup()">
💬 <span>Confirmar aquí</span>
</button>

<button class="btn mapa" onclick="ubicacion()">
📍 Dirección
<div class="texto-lugar">ScutiPARK<br>San Lorenzo</div>
</button>

<button class="btn ruta" onclick="comoLlegar()">cómo llegar🧭</button>

</div>

<div id="popup" class="popup" onclick="cerrarPopup(event)">
<div class="popup-contenido" onclick="event.stopPropagation()">

<h3>¿Vas a asistir?</h3>

<button class="si" onclick="confirmarSi()">✅ Sí asistiré</button> <button class="no" onclick="confirmarNo()">❌ No podré</button>

<br><br>

<button onclick="cerrarPopup()">Cancelar</button>

</div>
</div>

<div id="pantallaInicio" class="pantalla-inicio">
<button class="boton-ingresar" onclick="comenzarInvitacion()">
ABRIR INVITACIÓN 🎉
</button>
</div>

<audio id="musicaFondo" loop>
<source src="musica-cumple.mp3" type="audio/mpeg">
</audio>

<div class="galeria">
<div class="imagen"><img src="./1.svg"></div>
<div class="imagen"><img src="./2.svg"></div>
<div class="imagen"><img src="./3.svg"></div>
<div class="imagen"><img src="./4.svg"></div>
</div>

<script>

const audio = document.getElementById("musicaFondo");
let musicaActiva = false;

/* INICIO */
function comenzarInvitacion(){
const pantalla = document.getElementById("pantallaInicio");
pantalla.style.opacity="0";

setTimeout(()=>{
pantalla.style.display="none";
document.body.style.overflow="auto";
},600);

audio.play().then(()=>{
musicaActiva = true;
}).catch(()=>{});
}

/* POPUP */
function abrirPopup(){
document.getElementById("popup").style.display="flex";
}

function cerrarPopup(e){
if(!e || e.target.id==="popup"){
document.getElementById("popup").style.display="none";
}
}

/* WHATSAPP */
function confirmarSi(){
let msg="🎉 Confirmo asistencia al cumple de Eithan.\nNombre:";
window.open("https://wa.me/595981011531?text="+encodeURIComponent(msg));
}

function confirmarNo(){
let msg="Hola, no podré asistir al cumple de Eithan.\nNombre:";
window.open("https://wa.me/595981011531?text="+encodeURIComponent(msg));
}

/* MAPA */
function ubicacion(){
window.open("https://maps.app.goo.gl/o5QvAw4BDHEiffHUA");
}

function comoLlegar(){
let destino="ScutiPARK San Lorenzo Paraguay";
window.open("https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(destino));
}

/* 🔊 CONTROL INTELIGENTE DEL AUDIO */

// Minimizar / cambiar pestaña
document.addEventListener("visibilitychange",()=>{
if(!musicaActiva) return;

if(document.hidden){
audio.pause();
}else{
audio.play().catch(()=>{});
}
});

// Salir de la ventana
window.addEventListener("blur", ()=>{
if(musicaActiva){
audio.pause();
}
});

// Volver a la ventana
window.addEventListener("focus", ()=>{
if(musicaActiva){
audio.play().catch(()=>{});
}
});

// Cerrar o recargar
window.addEventListener("beforeunload", ()=>{
audio.pause();
});

</script>

</body>
</html>
