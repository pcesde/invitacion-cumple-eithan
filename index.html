<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎉 Eithan cumple 1 añito</title>

<!-- OPEN GRAPH -->

<meta property="og:title" content="🎉 ¡Eithan cumple 1 añito! 🎉 ">
<meta property="og:description" content="Estás invitado a celebrar este día especial 🎂👇">
<meta property="og:image" content="https://raw.githubusercontent.com/pcesde/invitacion-cumple-eithan/main/preview.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://pcesde.github.io/invitacion-cumple-eithan/">
<meta property="og:type" content="website">

<meta name="theme-color" content="#000000">

<style>

body{
margin:0;
background:#000;
font-family:Arial,sans-serif;
overflow:hidden;
}

/* INICIO */
.pantalla-inicio{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
z-index:9999;
}

.boton-ingresar{
padding:18px 34px;
border:none;
border-radius:40px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(135deg,#FFD54F,#FFB300);
}

/* GALERIA */
.galeria{display:flex;flex-direction:column;}
.imagen{height:100vh;display:flex;justify-content:center;align-items:center;}
.imagen img{width:100%;height:100%;object-fit:contain;}

/* BOTONES */
.botones{
position:fixed;
bottom:20px;
right:20px;
display:flex;
flex-direction:column;
gap:12px;
z-index:999;
}

/* BOTÓN PRO */
.btn.wa.pro{
background:linear-gradient(135deg,#25D366,#1ebe5d);
width:70px;
height:70px;
border-radius:50%;
border:none;
color:white;
font-size:20px;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
animation:flotar 2s infinite ease-in-out;
}

.btn.wa.pro span{
font-size:11px;
}

/* BRILLO */
.btn.wa.pro::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
transform:rotate(25deg);
animation:brillo 3s infinite;
}

/* ANIMACIONES */
@keyframes flotar{
0%{transform:translateY(0);}
50%{transform:translateY(-6px);}
100%{transform:translateY(0);}
}

@keyframes brillo{
0%{left:-50%;}
100%{left:150%;}
}

/* MAPA */
.btn.mapa,.btn.ruta{
padding:14px;
border:none;
border-radius:18px;
color:white;
cursor:pointer;
}

.btn.mapa{background:#4285F4;}
.btn.ruta{background:#FF9800;}

.texto-lugar{font-size:12px;}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-contenido{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
}

.si{background:#25D366;color:white;padding:10px;border:none;border-radius:10px;}
.no{background:#e74c3c;color:white;padding:10px;border:none;border-radius:10px;}

/* NOTIFICACIÓN */
.notificacion-rsvp{
position:fixed;
bottom:95px;
right:20px;
background:#ff4757;
color:white;
padding:10px 14px;
border-radius:20px;
font-size:13px;
font-weight:bold;
animation:latido 1.5s infinite;
z-index:1000;
}

.notificacion-rsvp::after{
content:"";
position:absolute;
bottom:-8px;
right:20px;
border:8px solid transparent;
border-top-color:#ff4757;
}

@keyframes latido{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

</style>

</head>

<body>

<!-- BOTONES -->

<div class="botones">

<button class="btn wa pro" onclick="abrirPopup()">
💬 <span>Confirmar Aquí🎉</span>
</button>

<button class="btn mapa" onclick="ubicacion()">📍</button> <button class="btn ruta" onclick="comoLlegar()">🧭</button>

</div>

<!-- NOTIFICACIÓN -->

<div class="notificacion-rsvp" id="noti">
¡Confirma aquí! 🎉
</div>

<!-- POPUP -->

<div id="popup" class="popup" onclick="cerrarPopup(event)">
<div class="popup-contenido" onclick="event.stopPropagation()">

<h3>¿Vas a asistir?</h3>

<button class="si" onclick="confirmarSi()">Sí asistiré</button> <button class="no" onclick="confirmarNo()">No podré</button>

</div>
</div>

<!-- INICIO -->

<div id="pantallaInicio" class="pantalla-inicio">
<button class="boton-ingresar" onclick="comenzarInvitacion()">ABRIR INVITACIÓN 🎉</button>
</div>

<!-- AUDIO -->

<audio id="musicaFondo" loop>
<source src="musica-bautismo.mp3" type="audio/mpeg">
</audio>

<!-- GALERIA -->

<div class="galeria">
<div class="imagen"><img src="./1.svg"></div>
<div class="imagen"><img src="./2.svg"></div>
<div class="imagen"><img src="./3.svg"></div>
<div class="imagen"><img src="./4.svg"></div>
</div>

<script>

const audio=document.getElementById("musicaFondo");

function comenzarInvitacion(){
document.getElementById("pantallaInicio").style.display="none";
document.body.style.overflow="auto";
audio.play().catch(()=>{});
}

function abrirPopup(){
document.getElementById("popup").style.display="flex";
document.getElementById("noti").style.display="none";
}

function cerrarPopup(e){
if(!e || e.target.id==="popup"){
document.getElementById("popup").style.display="none";
}
}

function confirmarSi(){
let msg="🎉 Confirmo asistencia al cumple de Eithan. Nombre:";
window.open("https://wa.me/595981011531?text="+encodeURIComponent(msg));
}

function confirmarNo(){
let msg="No podré asistir al cumple de Eithan. Nombre:";
window.open("https://wa.me/595981011531?text="+encodeURIComponent(msg));
}

function ubicacion(){
window.open("https://maps.app.goo.gl/o5QvAw4BDHEiffHUA");
}

function comoLlegar(){
window.open("https://www.google.com/maps/dir/?api=1&destination=ScutiPARK");
}

/* OCULTAR NOTIFICACIÓN */
setTimeout(()=>{
let n=document.getElementById("noti");
if(n) n.style.display="none";
},6000);

</script>

</body>
</html>
